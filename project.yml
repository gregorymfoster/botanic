name: Botanic
options:
  bundleIdPrefix: com.gregfoster
  deploymentTarget:
    iOS: "26.0"
packages:
  BotanicKit:
    path: BotanicKit
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 2V7W69N399
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.2"
    VERSIONING_SYSTEM: apple-generic
targets:
  Botanic:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - BotanicApp
    dependencies:
      - package: BotanicKit
      - package: Sentry
        product: Sentry
      - target: BotanicWidgets
        embed: true
    # A minimal Info.plist for the keys that can't be expressed as INFOPLIST_KEY_* build settings —
    # the custom URL scheme (nested array) and the Live Activities flag. GENERATE_INFOPLIST_FILE: YES
    # stays on and merges its synthesized keys (bundle id, version, executable, …) into this file.
    info:
      path: BotanicApp/Info.plist
      properties:
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLName: com.gregfoster.botanic
            CFBundleURLSchemes:
              - botanic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gregfoster.botanic
        PRODUCT_NAME: Botanic
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Botanic
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  BotanicWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - BotanicWidgets
    dependencies:
      - package: BotanicKit
    info:
      path: BotanicWidgets/Info.plist
      properties:
        CFBundleDisplayName: Botanic
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gregfoster.botanic.BotanicWidgets
        PRODUCT_NAME: BotanicWidgets
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Botanic
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic

  BotanicKitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BotanicKit/Tests/BotanicKitTests
    dependencies:
      - package: BotanicKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gregfoster.botanic.kittests
        GENERATE_INFOPLIST_FILE: YES

  BotanicAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - BotanicAppTests
    dependencies:
      - target: Botanic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gregfoster.botanic.apptests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Botanic.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Botanic
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  Botanic:
    build:
      targets:
        Botanic: all
    test:
      gatherCoverageData: true
      targets:
        - BotanicKitTests
        - BotanicAppTests
