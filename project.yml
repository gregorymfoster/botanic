name: Botanic
options:
  bundleIdPrefix: com.gregfoster
  deploymentTarget:
    iOS: "17.0"
packages:
  BotanicKit:
    path: BotanicKit
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 2V7W69N399
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.1"
    VERSIONING_SYSTEM: apple-generic
targets:
  Botanic:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - BotanicApp
    dependencies:
      - package: BotanicKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gregfoster.botanic
        PRODUCT_NAME: Botanic
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Botanic
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  BotanicKitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BotanicKit/Tests/BotanicKitTests
    dependencies:
      - package: BotanicKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gregfoster.botanic.kittests
        GENERATE_INFOPLIST_FILE: YES
